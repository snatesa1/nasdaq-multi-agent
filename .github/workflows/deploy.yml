name: Deploy Nasdaq Multi-Agent to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for Workload Identity Federation (OIDC)
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node 24 for actions

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

#      - name: Run Tests
#        run: |
#          pytest tests/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push Image (Cloud Build)
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/nasdaq-multi-agent

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: nasdaq-multi-agent
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/nasdaq-multi-agent
          region: asia-southeast1
          env_vars: |
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            SLACK_CHANNEL_ID=${{ secrets.SLACK_CHANNEL_ID }}
            EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
            EMAIL_RECIPIENT=${{ secrets.EMAIL_RECIPIENT }}
            VERTEX_MODEL=${{ secrets.VERTEX_MODEL }}

      - name: Update Cloud Scheduler
        run: |
          # Replicate the logic from deploy_app.sh for Cloud Scheduler
          SCHEDULER_JOB="nasdaq-analysis-daily"
          REGION="asia-southeast1"
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          
          # Delete existing job if present
          gcloud scheduler jobs delete $SCHEDULER_JOB --location=$REGION --quiet || true
          
          gcloud scheduler jobs create http $SCHEDULER_JOB \
            --location=$REGION \
            --schedule="0 19 * * 1-5" \
            --uri="$SERVICE_URL/cron/analyze" \
            --http-method=POST \
            --headers="X-Cron-Secret=${{ secrets.CRON_SECRET }}" \
            --time-zone="Asia/Singapore" \
            --attempt-deadline=300s
